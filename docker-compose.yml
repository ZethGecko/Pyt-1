version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_transportes
      POSTGRES_USER: app_admin
      POSTGRES_PASSWORD: Admin1234!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_admin -d db_transportes"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: demo_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/db_transportes
      SPRING_DATASOURCE_USERNAME: app_admin
      SPRING_DATASOURCE_PASSWORD: Admin1234!
      # JWT settings (same as in application.properties)
      JWT_SECRET: transportes-bo-secret-key-muy-largo-para-firmar-tokens-jwt-con-hmacsha256-algoritmo
      JWT_EXPIRATION: 2592000000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: demo_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    # Optional: set environment variable for the frontend to know the backend URL
    # This can be used if the frontend needs to know the API base URL at build time or runtime.
    # For Angular, we can use environment files or inject via nginx.
    # Here we set an environment variable that can be accessed via window.env if we set up a way to pass it.
    # However, since we are using nginx, we can replace a default config with a dynamic one using envsubst.
    # For simplicity, we'll leave it to the user to adjust if needed.
    # environment:
    #   - API_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data: