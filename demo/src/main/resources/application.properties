spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_transportes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

org.hibernate.envers.audit_table_suffix=${ORG_HIBERNATE_ENVERS_AUDIT_TABLE_SUFFIX:_AUD}
org.hibernate.envers.revision_field_name=rev
org.hibernate.envers.revision_on_collection_change=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:2592000000}

spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.serialization.FAIL_ON_SELF_REFERENCES=false

app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.formatos.dir=${APP_FORMATOS_DIR:uploads/formatos}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
