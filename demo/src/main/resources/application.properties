spring.datasource.url=jdbc:postgresql://localhost:5432/db_transportes
spring.datasource.username=app_admin
spring.datasource.password=Admin1234!
spring.datasource.driver-class-name=org.postgresql.Driver

#spring.jpa.hibernate.ddl-auto=create
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=transportes-bo-secret-key-muy-largo-para-firmar-tokens-jwt-con-hmacsha256-algoritmo
jwt.expiration=2592000000

# Jackson - Evitar errores de serialización con proxies de Hibernate
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.serialization.FAIL_ON_SELF_REFERENCES=false

# File Upload Configuration
app.upload.dir=uploads

# Multipart config for file uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
