<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4" (click)="cerrar()">
  <div class="bg-white rounded-lg shadow-xl max-w-md w-full max-h-[90vh] overflow-y-auto" (click)="$event.stopPropagation()">
    <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-gray-900">Derivar Trámite</h3>
      <button (click)="cerrar()" class="text-gray-400 hover:text-gray-600">✕</button>
    </div>

    <div class="p-6">
      <div *ngIf="tramiteCodigo" class="bg-gray-50 p-3 rounded-md mb-4">
        <p class="text-sm text-gray-600"><strong>Trámite:</strong> {{ tramiteCodigo }}</p>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Instrucciones (opcional)</label>
        <textarea [(ngModel)]="instrucciones" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Instrucciones para el departamento destino..."></textarea>
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Seleccione un departamento <span class="text-red-500">*</span></label>

        <div *ngIf="cargando" class="flex justify-center py-4">
          <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-500"></div>
        </div>

        <div *ngIf="!cargando && departamentos.length === 0" class="text-center py-4 text-gray-500">
          No hay departamentos disponibles
        </div>

        <div *ngIf="!cargando && departamentos.length > 0" class="space-y-2 max-h-60 overflow-y-auto">
          <div *ngFor="let dept of departamentos; trackBy: trackByDeptId"
               class="p-3 border rounded-lg cursor-pointer transition-colors"
               [class.bg-blue-50]="departamentoSeleccionado?.id === dept.id"
               [class.border-gray-200]="departamentoSeleccionado?.id !== dept.id"
               [class.border-blue-500]="departamentoSeleccionado?.id === dept.id"
               (click)="seleccionarDepartamento(dept)">
            <div class="flex justify-between items-start">
              <div>
                <div class="font-medium text-gray-900">{{ dept.nombre }}</div>
                <div *ngIf="dept.descripcion" class="text-sm text-gray-500">{{ dept.descripcion }}</div>
                <div *ngIf="dept.responsableNombre" class="text-xs text-gray-400 mt-1">Responsable: {{ dept.responsableNombre }}</div>
              </div>
              <div class="text-gray-400">
                <svg *ngIf="departamentoSeleccionado?.id === dept.id" class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Sección de usuario responsable (solo si hay departamento seleccionado) -->
        <div *ngIf="departamentoSeleccionado && ((usuariosDepartamento && usuariosDepartamento.length > 0) || cargandoUsuarios)" class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">Usuario Responsable (opcional)</label>
          
          <div *ngIf="cargandoUsuarios" class="flex justify-center py-2">
            <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-blue-500"></div>
          </div>

          <div *ngIf="!cargandoUsuarios && usuariosDepartamento.length === 0" class="text-center py-2 text-gray-500 text-sm">
            No hay usuarios en este departamento
          </div>

          <div *ngIf="!cargandoUsuarios && usuariosDepartamento.length > 0" class="space-y-2 max-h-40 overflow-y-auto border border-gray-200 rounded-lg p-2">
            <div *ngFor="let usuario of usuariosDepartamento; trackBy: trackByUserId"
                 class="p-2 border rounded cursor-pointer transition-colors"
                 [class.bg-blue-50]="usuarioResponsableSeleccionado?.id === usuario.id"
                 [class.border-gray-200]="usuarioResponsableSeleccionado?.id !== usuario.id"
                 [class.border-blue-500]="usuarioResponsableSeleccionado?.id === usuario.id"
                 (click)="usuarioResponsableSeleccionado = usuario">
              <div class="flex items-center justify-between">
                <div>
                  <div class="font-medium text-gray-900">{{ usuario.username }}</div>
                  <div *ngIf="usuario.email" class="text-sm text-gray-500">{{ usuario.email }}</div>
                  <div *ngIf="usuario.role" class="text-xs text-gray-400">{{ usuario.role.name }}</div>
                </div>
                <div class="text-gray-400" *ngIf="usuarioResponsableSeleccionado?.id === usuario.id">
                  <svg class="w-4 h-4 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div *ngIf="error" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-md text-red-600 text-sm">
          {{ error }}
        </div>
      </div>
    </div>

    <div class="border-t border-gray-200 px-6 py-4 flex justify-end gap-3">
      <button type="button" (click)="cerrar()" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">Cancelar</button>
      <button type="button" (click)="onDerivar()" [disabled]="!departamentoSeleccionado || cargando" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
        <span *ngIf="cargando" class="flex items-center gap-2">
          <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
          Derivando...
        </span>
        <span *ngIf="!cargando">➡️ Derivar Trámite</span>
      </button>
    </div>
  </div>
</div>
