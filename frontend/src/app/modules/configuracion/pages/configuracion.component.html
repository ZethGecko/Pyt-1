<!-- Header -->
<div class="page-container">
  <div class="page-header">
    <div class="header-content">
      <div class="header-icon">
        <app-icon name="settings" size="lg"></app-icon>
      </div>
      <div class="header-text">
        <h1 class="page-title">Configuración del Sistema</h1>
        <p class="page-subtitle">Administra la configuración regulatoria del sistema de transporte</p>
      </div>
    </div>
  </div>

  <!-- Módulos Grid -->
  <div class="modules-grid">
    @for (modulo of modulos; track modulo.titulo) {
      <a [routerLink]="modulo.ruta" 
         class="module-card"
         [class]="'module-' + modulo.color">
        <div class="module-icon">
          <app-icon [name]="modulo.icono" size="lg"></app-icon>
        </div>
        <div class="module-content">
          <h3 class="module-title">{{ modulo.titulo }}</h3>
          <p class="module-description">{{ modulo.descripcion }}</p>
        </div>
        <div class="module-arrow">
          <app-icon name="chevron-right" size="sm"></app-icon>
        </div>
      </a>
    }
  </div>
