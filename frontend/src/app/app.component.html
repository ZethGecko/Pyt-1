<!-- app.component.html -->
@if (!authState.isLoggedIn()) {
  <!-- Layout público -->
  <div class="public-layout">
    <router-outlet></router-outlet>
    <app-notification-container></app-notification-container>
  </div>
} @else {
  <!-- Layout privado -->
  <div class="app-layout">
    <!-- Sidebar -->
    @if (showSidebar) {
      <app-sidebar 
        class="sidebar-container" 
        [class.sidebar-hidden]="!isSidebarOpen"
        (toggle)="toggleSidebar()">
      </app-sidebar>
    }
    
    <!-- Contenido principal -->
    <div class="main-container" [class.main-expanded]="!isSidebarOpen">
      <!-- Navbar -->
      <header class="navbar">
        <div class="navbar-content">
          <div class="navbar-left">
            <button 
              (click)="toggleSidebar()" 
              class="menu-toggle-btn"
              [class.menu-toggle-rotated]="!isSidebarOpen"
              title="Alternar menú">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
              </svg>
            </button>
            
            <div class="brand">
              <div class="brand-icon-wrapper">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
              </div>
              <span class="brand-text">Sistema de Gestión de Transporte</span>
            </div>
          </div>
          
           <div class="navbar-right">
             <!-- Usuario -->
            <div class="user-menu">
              <div class="user-avatar">
                <span class="user-initial">{{authState.currentUser()?.username?.charAt(0)?.toUpperCase() || 'U'}}</span>
                <div class="user-status"></div>
              </div>
              
              <div class="user-info">
                <span class="user-name">{{authState.currentUser()?.username}}</span>
                <span class="user-role">{{authState.userRole()}}</span>
              </div>
              
              <div class="user-actions">
                <button class="icon-btn user-action-btn" title="Configuración">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </button>
                
                <button (click)="logout()" class="icon-btn logout-btn" title="Cerrar sesión">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>
      
      <!-- Contenido dinámico -->
      <main class="main-content">
        <div class="content-wrapper">
          <router-outlet></router-outlet>
        </div>
      </main>
      
      <app-notification-container></app-notification-container>
    </div>
  </div>
}
